# =============================================================================
#  OBSERVABILITY STACK
#  Only these tools run in Podman. Your apps run normally on the server.
#
#  Start:   podman-compose up -d
#  Grafana: http://localhost:3000  (admin / admin)
# =============================================================================

version: "3.8"

networks:
  observability:
    driver: bridge

services:
  # ---------------------------------------------------------------------------
  #  PROMETHEUS — collects metrics | http://localhost:9090
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: obs-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - observability

  # ---------------------------------------------------------------------------
  #  LOKI — stores logs | keeps logs for 15 days
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.1.0
    container_name: obs-loki
    restart: always
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - ./data/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - observability

  # ---------------------------------------------------------------------------
  #  PROMTAIL — reads log files from your server, sends them to Loki
  #
  #  Your log files are mounted below. Promtail reads them directly
  #  from the host filesystem — your apps don't need to change anything.
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.1.0
    container_name: obs-promtail
    restart: always
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./data/promtail:/promtail

      # =====================================================================
      #  YOUR LOG FOLDERS — mount them here
      #
      #  Format:  - /where/logs/are/on/server:/same/path/inside/container:ro,z
      #
      #  We mount the whole parent directory so all logs inside are visible.
      #  The :ro means read-only, :z makes it work on SELinux servers.
      #
      #  UNCOMMENT the lines you need:
      # =====================================================================

      # Java services (flowable, housing-loan, vehicle-loan, sso, etc.)
      # - /opt/sit/executables/java-services:/opt/sit/executables/java-services:ro,z

      # Nginx logs
      # - /var/log/nginx:/var/log/nginx:ro,z

      # System logs
      # - /var/log:/var/log/host:ro,z

    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - observability

  # ---------------------------------------------------------------------------
  #  GRAFANA — shows dashboards | http://localhost:3000 (admin / admin)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: obs-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - observability
