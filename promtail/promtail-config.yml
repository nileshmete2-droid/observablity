# =============================================================================
#  PROMTAIL — reads your app's log files and sends them to Loki
#
#  HOW TO ADD YOUR LOGS:
#  1. Uncomment an example below (or copy the template at the bottom)
#  2. Change the "service" name (this is the label you see in Grafana)
#  3. Change the "__path__" to your log file location
#  4. Restart:  podman-compose restart promtail
#
#  That's it! Open Grafana → pick your service → see logs.
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    basic_auth:
      username: obsuser
      password: obspass123

scrape_configs:

  # ---- EXAMPLE 1: Order Service (Java) ---------------------------------------
  #
  # - job_name: order-service
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "order-service"
  #         __path__: "/opt/apps/order-service/logs/app.log"

  # ---- EXAMPLE 2: Payment Service --------------------------------------------
  #
  # - job_name: payment-service
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "payment-service"
  #         __path__: "/opt/apps/payment-service/logs/*.log"

  # ---- EXAMPLE 3: User Service -----------------------------------------------
  #
  # - job_name: user-service
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "user-service"
  #         __path__: "/opt/apps/user-service/logs/*.log"

  # ---- EXAMPLE 4: Auth Service -----------------------------------------------
  #
  # - job_name: auth-service
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "auth-service"
  #         __path__: "/opt/apps/auth-service/logs/*.log"

  # ---- EXAMPLE 5: Notification Service ---------------------------------------
  #
  # - job_name: notification-service
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "notification-service"
  #         __path__: "/opt/apps/notification-service/logs/*.log"

  # ---- EXAMPLE 6: Single log file (not a folder) ----------------------------
  #
  # - job_name: my-app
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "my-app"
  #         __path__: "/opt/apps/my-app/app.log"

  # ---- EXAMPLE 7: Nginx logs ------------------------------------------------
  #
  # - job_name: nginx
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "nginx"
  #         __path__: "/var/log/nginx/*.log"

  # ============================================================================
  #  TEMPLATE — copy this for any new service
  #
  #  Just change 2 things:
  #    service: "YOUR_LABEL"        ← what you see in Grafana
  #    __path__: "/your/log/path"   ← where your log file is
  # ============================================================================
  #
  # - job_name: YOUR_LABEL
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "YOUR_LABEL"
  #         __path__: "/your/log/file.log"
