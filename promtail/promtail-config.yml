# =============================================================================
#  PROMTAIL — reads your app's log files and sends them to Loki
#
#  HOW TO ADD YOUR LOGS:
#  1. Uncomment an example below (or copy the template at the bottom)
#  2. Change the "service" name (this is the label you see in Grafana)
#  3. Change the "__path__" to your log file location
#  4. Restart:  podman-compose restart promtail
#
#  That's it! Open Grafana → pick your service → see logs.
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    basic_auth:
      username: obsuser
      password: obspass123

scrape_configs:

  # ---- EXAMPLE 1: Flowable (Java service) -----------------------------------
  #
  # - job_name: flowable
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "flowable"
  #         __path__: "/opt/sit/executables/java-services/flowable/flow.log"

  # ---- EXAMPLE 2: Housing Loan service --------------------------------------
  #
  # - job_name: housing-loan
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "housing-loan"
  #         __path__: "/opt/sit/executables/java-services/housing-loan/*.log"

  # ---- EXAMPLE 3: Vehicle Loan service --------------------------------------
  #
  # - job_name: vehicle-loan
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "vehicle-loan"
  #         __path__: "/opt/sit/executables/java-services/vehicle-loan/*.log"

  # ---- EXAMPLE 4: SSO / Auth service ----------------------------------------
  #
  # - job_name: sso
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "sso"
  #         __path__: "/opt/sit/executables/java-services/sso/*.log"

  # ---- EXAMPLE 5: Dashboard service -----------------------------------------
  #
  # - job_name: dashboard
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "dashboard"
  #         __path__: "/opt/sit/executables/java-services/dashboard/*.log"

  # ---- EXAMPLE 6: Extraction service ----------------------------------------
  #
  # - job_name: extraction
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "extraction"
  #         __path__: "/opt/sit/executables/java-services/extraction/*.log"

  # ---- EXAMPLE 7: Nginx logs ------------------------------------------------
  #
  # - job_name: nginx
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "nginx"
  #         __path__: "/var/log/nginx/*.log"

  # ============================================================================
  #  TEMPLATE — copy this for any new service
  #
  #  Just change 2 things:
  #    service: "YOUR_LABEL"        ← what you see in Grafana
  #    __path__: "/your/log/path"   ← where your log file is
  # ============================================================================
  #
  # - job_name: YOUR_LABEL
  #   static_configs:
  #     - targets: [localhost]
  #       labels:
  #         service: "YOUR_LABEL"
  #         __path__: "/your/log/file.log"
