# =============================================================================
#  GRAFANA – AUTO-PROVISIONED DATA SOURCES
#  These are available immediately on first boot — no manual setup needed.
#
#  ★ BASIC AUTH: Grafana connects to Loki & Prometheus using these
#    credentials. Change them in production.
# =============================================================================

apiVersion: 1

datasources:
  # ---------------------------------------------------------------------------
  #  LOKI – for log queries
  #  Auth: basic auth pre-configured (obsuser / obspass123)
  # ---------------------------------------------------------------------------
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    basicAuth: true
    basicAuthUser: obsuser                # ✎ Change in production
    secureJsonData:
      basicAuthPassword: obspass123       # ✎ Change in production
    jsonData:
      maxLines: 1000
      timeout: 60

  # ---------------------------------------------------------------------------
  #  PROMETHEUS – for metrics queries
  #  Auth: basic auth pre-configured (obsuser / obspass123)
  # ---------------------------------------------------------------------------
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false
    basicAuth: true
    basicAuthUser: obsuser                # ✎ Change in production
    secureJsonData:
      basicAuthPassword: obspass123       # ✎ Change in production
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
